{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Medicine Recommendation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --primary: #00f2fe;
      --secondary: #4facfe;
      --accent: #7000ff;
      --bg-dark: #060912;
      --panel-glass: rgba(15, 23, 42, 0.75);
      --text-bright: #f8fafc;
      --text-dim: #94a3b8;
      --card-border: rgba(255, 255, 255, 0.1);
      --success: #10b981;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Plus Jakarta Sans", sans-serif;
      color: var(--text-bright);
      background: var(--bg-dark);
      overflow-x: hidden;
      display: flex;
      justify-content: center;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: 
        radial-gradient(circle at 0% 0%, rgba(0, 242, 254, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(112, 0, 255, 0.15) 0%, transparent 40%),
        radial-gradient(circle at 50% 50%, rgba(79, 172, 254, 0.05) 0%, transparent 50%);
      z-index: -1;
      animation: meshGradient 15s ease infinite alternate;
    }

    @keyframes meshGradient {
      0% { transform: scale(1); }
      100% { transform: scale(1.1); }
    }

    .layout {
      position: relative;
      z-index: 1;
      max-width: 1300px;
      width: 95%;
      margin: 40px auto;
      display: grid;
      grid-template-columns: 480px 1fr;
      gap: 30px;
    }

    .panel {
      background: var(--panel-glass);
      backdrop-filter: blur(20px) saturate(180%);
      border-radius: 28px;
      border: 1px solid var(--card-border);
      padding: 35px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-family: "Outfit", sans-serif;
      font-size: 2.2rem;
      background: linear-gradient(to right, var(--primary), var(--secondary));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-top: 0;
    }

    .subtitle {
      color: var(--text-dim);
      font-size: 0.95rem;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    label {
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--secondary);
      display: block;
      margin-bottom: 10px;
    }

    input, select {
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 12px 15px;
      color: white;
      width: 100%;
      margin-bottom: 20px;
      outline: none;
      transition: all 0.3s ease;
      font-size: 1rem;
    }

    select option { background: #0f172a; color: white; padding: 10px; }

    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
    }

    .grid.two-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .symptom-enhanced {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 18px;
      padding: 20px;
      border: 1px solid var(--card-border);
    }

    .selected-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      max-height: 250px;
      overflow-y: auto;
    }

    .tag {
      padding: 8px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s ease;
    }

    .tag.is-selected {
      background: linear-gradient(135deg, var(--accent), var(--secondary));
      color: white;
      border-color: transparent;
    }

    .btn-main {
      background: linear-gradient(90deg, var(--secondary), var(--accent));
      color: white;
      border: none;
      padding: 18px;
      border-radius: 15px;
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      width: 100%;
      margin-top: 15px;
      transition: 0.2s;
    }

    .btn-download {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid var(--primary);
      color: var(--primary);
      padding: 10px 20px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 20px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.3s;
    }

    .btn-download:hover { background: var(--primary); color: var(--bg-dark); }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 25px;
    }

    .result-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 20px;
    }

    .result-card h3 { color: var(--secondary); margin-top: 0; font-size: 1.1rem; }
    .result-card ul { padding-left: 20px; color: var(--text-dim); }

    .native-symptoms { display: none; }

    @media (max-width: 1040px) { .layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="layout">
    <section class="panel form-panel">
      <h1>Symptom Predictor</h1>
      <p class="subtitle">AI-driven analysis for health insights and preliminary guidance.</p>

      <form id="recommendation-form" method="post" action="{% url 'recommend' %}">
        {% csrf_token %}
        <div class="grid two-cols">
          <div>
            <label>Age</label>
            <input type="number" id="input-age" name="age" min="0" max="120" placeholder="Years" required>
          </div>
          <div>
            <label>Gender</label>
            <select id="input-gender" name="gender" required>
              <option value="" disabled selected>Choose Gender</option>
              <option value="male">Male</option>
              <option value="female">Female</option>
              <option value="other">Other</option>
            </select>
          </div>
        </div>

        <select name="symptoms" id="symptoms" class="native-symptoms" multiple required>
          {% for value, label in form.fields.symptoms.choices %}
            <option value="{{ value }}">{{ label }}</option>
          {% endfor %}
        </select>

        <label>Select Symptoms</label>
        <div id="symptoms-enhanced" class="symptom-enhanced"></div>

        <button type="submit" class="btn-main">Analyze Health Data</button>
      </form>
    </section>

    <section class="panel result-panel" id="result-panel">
      <div class="result-empty" style="text-align: center; padding-top: 100px; color: var(--text-dim);">
        <p>Awaiting health parameters for analysis.</p>
      </div>
    </section>
  </main>

  <script>
    const form = document.getElementById("recommendation-form");
    const panel = document.getElementById("result-panel");
    let currentResult = null;

    function escapeHtml(v) { return String(v).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[m])); }

    function renderResult(data) {
      currentResult = data.result;
      const r = currentResult;
      
      panel.innerHTML = `
        <div style="display: flex; justify-content: space-between; align-items: start;">
            <div>
                <span style="color: var(--success); font-weight: 700; font-size: 0.9rem;">CONFIDENCE MATCH: ${(r.confidence * 100).toFixed(1)}%</span>
                <h2 style="color: var(--primary); margin: 5px 0 15px 0; font-size: 2rem; font-family: 'Outfit';">${escapeHtml(r.disease)}</h2>
            </div>
            <button onclick="downloadPDF()" class="btn-download">
                <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                Download Report
            </button>
        </div>
        <p class="subtitle" style="font-size: 1.1rem; border-left: 3px solid var(--accent); padding-left: 15px;">${escapeHtml(r.description || "")}</p>
        <div class="result-grid">
          <div class="result-card"><h3>💊 Medications</h3><ul>${r.medications.map(i => `<li>${escapeHtml(i)}</li>`).join("")}</ul></div>
          <div class="result-card"><h3>🛡️ Precautions</h3><ul>${r.precautions.map(i => `<li>${escapeHtml(i)}</li>`).join("")}</ul></div>
          <div class="result-card"><h3>🥗 Nutrition</h3><ul>${r.diet.map(i => `<li>${escapeHtml(i)}</li>`).join("")}</ul></div>
          <div class="result-card"><h3>🏃 Fitness</h3><ul>${r.workout.map(i => `<li>${escapeHtml(i)}</li>`).join("")}</ul></div>
        </div>
        <div style="background: rgba(255,255,255,0.05); border-radius: 12px; padding: 15px; margin-top: 25px;">
            <p style="font-size: 0.8rem; color: var(--text-dim); margin: 0;">
              <strong>Medical Disclaimer:</strong> ${escapeHtml(r.medical_disclaimer || "Consult a licensed medical professional for formal diagnosis.")}
            </p>
        </div>
      `;
    }

    async function downloadPDF() {
      if (!currentResult) return;
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF('p', 'mm', 'a4');
      const pageWidth = doc.internal.pageSize.getWidth();
      
      // -- Branded Header --
      doc.setFillColor(15, 23, 42);
      doc.rect(0, 0, pageWidth, 40, 'F');
      
      doc.setTextColor(0, 242, 254);
      doc.setFont("helvetica", "bold");
      doc.setFontSize(22);
      doc.text("AI HEALTH REPORT", 20, 25);
      
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(10);
      doc.text(`Date: ${new Date().toLocaleDateString()}`, pageWidth - 60, 20);
      doc.text(`Time: ${new Date().toLocaleTimeString()}`, pageWidth - 60, 26);

      // -- Patient Info Section --
      let y = 55;
      doc.setTextColor(15, 23, 42);
      doc.setFontSize(12);
      doc.setFont("helvetica", "bold");
      doc.text("PATIENT PARAMETERS:", 20, y);
      
      doc.setFont("helvetica", "normal");
      doc.setFontSize(11);
      const age = document.getElementById('input-age').value;
      const gender = document.getElementById('input-gender').value;
      doc.text(`Age: ${age || 'N/A'}`, 20, y + 8);
      doc.text(`Gender: ${gender || 'N/A'}`, 70, y + 8);
      doc.text(`Confidence Match: ${(currentResult.confidence * 100).toFixed(1)}%`, 130, y + 8);

      // -- Diagnosis Highlight --
      y += 25;
      doc.setFillColor(240, 249, 255);
      doc.roundedRect(15, y, pageWidth - 30, 25, 3, 3, 'F');
      doc.setDrawColor(79, 172, 254);
      doc.setLineWidth(0.5);
      doc.roundedRect(15, y, pageWidth - 30, 25, 3, 3, 'D');
      
      doc.setTextColor(0, 100, 200);
      doc.setFontSize(14);
      doc.setFont("helvetica", "bold");
      doc.text("PREDICTED CONDITION:", 25, y + 10);
      doc.setTextColor(0, 0, 0);
      doc.setFontSize(16);
      doc.text(currentResult.disease.toUpperCase(), 25, y + 18);

      // -- Description --
      y += 35;
      doc.setTextColor(80, 80, 80);
      doc.setFontSize(10);
      doc.setFont("helvetica", "italic");
      const splitDesc = doc.splitTextToSize(currentResult.description, pageWidth - 40);
      doc.text(splitDesc, 20, y);
      y += (splitDesc.length * 5) + 10;

      // -- Detailed Recommendation Cards --
      const sections = [
        { title: "RECOMMENDED MEDICATIONS", data: currentResult.medications, color: [0, 120, 200] },
        { title: "SAFETY PRECAUTIONS", data: currentResult.precautions, color: [200, 50, 50] },
        { title: "DIETARY GUIDELINES", data: currentResult.diet, color: [16, 185, 129] },
        { title: "LIFESTYLE & FITNESS", data: currentResult.workout, color: [112, 0, 255] }
      ];

      sections.forEach(s => {
        if (y > 240) { doc.addPage(); y = 20; }
        
        doc.setFont("helvetica", "bold");
        doc.setFontSize(12);
        doc.setTextColor(s.color[0], s.color[1], s.color[2]);
        doc.text(s.title, 20, y);
        
        doc.setDrawColor(s.color[0], s.color[1], s.color[2]);
        doc.setLineWidth(0.2);
        doc.line(20, y + 2, pageWidth - 20, y + 2);
        
        y += 10;
        doc.setFontSize(11);
        doc.setTextColor(40, 40, 40);
        doc.setFont("helvetica", "normal");
        
        s.data.forEach(item => {
          doc.setFillColor(s.color[0], s.color[1], s.color[2]);
          doc.circle(23, y - 1, 0.8, 'F');
          const splitItem = doc.splitTextToSize(item, pageWidth - 50);
          doc.text(splitItem, 28, y);
          y += (splitItem.length * 6);
        });
        y += 8;
      });

      // -- Footer Disclaimer --
      const footerY = 280;
      doc.setFontSize(8);
      doc.setTextColor(150, 150, 150);
      doc.setFont("helvetica", "normal");
      const disclaimer = "DISCLAIMER: This report is generated by an AI model based on provided symptoms. It is NOT a professional medical diagnosis. Please consult a qualified doctor for clinical advice.";
      const splitFooter = doc.splitTextToSize(disclaimer, pageWidth - 40);
      doc.text(splitFooter, pageWidth / 2, footerY, { align: 'center' });

      doc.save(`${currentResult.disease.replace(/\s+/g, '_')}_Health_Report.pdf`);
    }

    function buildEnhancedSymptomSelector() {
      const selectEl = document.getElementById("symptoms");
      const host = document.getElementById("symptoms-enhanced");
      const options = Array.from(selectEl.options).map(opt => ({ value: opt.value, label: opt.textContent }));

      host.innerHTML = `<input id="symptom-search" class="symptom-search" type="text" placeholder="Filter symptoms..." style="background: rgba(0,0,0,0.3); margin-bottom:15px; border: 1px solid var(--card-border); padding:10px; border-radius:10px; width:100%; color:white; outline:none;" />
                        <div id="selected-tags" class="selected-tags"></div>`;

      const searchInput = document.getElementById("symptom-search");
      const tagsEl = document.getElementById("selected-tags");

      function renderTags() {
        const selected = new Set(Array.from(selectEl.selectedOptions).map(o => o.value));
        const q = searchInput.value.toLowerCase();
        tagsEl.innerHTML = options.filter(o => o.label.toLowerCase().includes(q)).map(item => `
          <span class="tag ${selected.has(item.value) ? 'is-selected' : ''}" data-value="${item.value}">${escapeHtml(item.label)}</span>
        `).join("");

        tagsEl.querySelectorAll(".tag").forEach(el => {
          el.addEventListener("click", () => {
            const val = el.dataset.value;
            Array.from(selectEl.options).find(o => o.value === val).selected = !selected.has(val);
            renderTags();
          });
        });
      }
      searchInput.addEventListener("input", renderTags);
      renderTags();
    }

    if (form) {
      buildEnhancedSymptomSelector();
      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        const fd = new FormData(form);
        panel.innerHTML = `<div style="text-align:center; padding-top:100px;"><div class="loader"></div><p style="margin-top:20px; color:var(--primary); font-weight:600;">ANALYZING CLINICAL PATTERNS...</p></div>`;
        try {
          const response = await fetch(form.action, {
            method: "POST",
            headers: { "X-Requested-With": "XMLHttpRequest", "X-CSRFToken": fd.get("csrfmiddlewaretoken") },
            body: fd,
          });
          const data = await response.json();
          if (data.ok) renderResult(data);
          else panel.innerHTML = `<p>Error processing data. Check inputs.</p>`;
        } catch (err) { panel.innerHTML = `<p>Network Error.</p>`; }
      });
    }
  </script>
</body>
</html>
